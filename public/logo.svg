  <!-- HomeBase text -->
  <text x="500" y="690" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="90" fill="#1a1a1a" letter-spacing="-2">HomeBase</text>

  <!-- AI text -->
  <text x="500" y="770" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="200" font-size="64" fill="#888888" letter-spacing="18">AI</text>

